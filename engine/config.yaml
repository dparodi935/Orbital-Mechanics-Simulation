# config.yaml

SIMULATION_PARAMS:
    duration: 12 #days
    initial_dt: 1
    debug_mode: true # true or false
 
CALCULATION_PARAMS:
    beta: 0.8 #0.8 or 0.9
    vel_error_tol: 0.0000001 #velocity error tolerance in m/s
    pos_error_tol: 0.0000001 #position error tolerance in m
   
#set either save_animation OR live_display to "True" to generate animation. Currently the specific setting only affects 2D
ANIMATION_PARAMS:
  mode: saved #'saved' or 'interactive' or 'none'
  dimensions: 2D #2D, 3D
  dpi: 250  
  framerate: 35
  save_folder: "C:/Users/dp271/Downloads"
  filename: "gravity_sim_tli"
  
# Presets: earth
# DON'T EDIT
PRESET_BODIES:
  - preset: sun
    mass: 1.989e+30
    radius: 6.957e+8
    color: yellow
    
  - preset: earth
    mass: 5.972e+24
    radius: 6.378e+6
    color: blue
    
  - preset: moon
    mass: 7.346e+22
    radius: 1.738e+6
    color: white

#Select the environment the simulation takes place in    
# Frames: cislunar, earth, sol 
FRAME:
    frame: cislunar

#Specify 
BODIES:
  - name: Standard
    mass: 1e+3
    radius: 1
    color: red
    position_input_mode: cylindrical_polar # 'cartesian' or 'cylindrical_polar'
    initial_pos: [1.18e+6,1.5,0] # given in altitude (above the body its orbiting)
    coord_origin: earth # Format: host_body_name[body2_name, LX]
    velocity_input_mode: cylindrical_polar # 'cartesian' or 'cylindrical_polar'
    initial_vel: [0,7.260e+3,0] #[0,+9.5e+3,0] # radial speed, tangential speed, z_speed
    
  - name: Free Return
    mass: 1e+3
    radius: 1
    color: green
    position_input_mode: cylindrical_polar # 'cartesian' or 'cylindrical_polar'
    initial_pos: [1.18e+6,5.5,0] # given in altitude (above the body its orbiting)
    coord_origin: earth # Format: host_body_name[body2_name, LX]
    velocity_input_mode: cylindrical_polar # 'cartesian' or 'cylindrical_polar'
    initial_vel: [0,7.260e+3,0] #[0,+9.5e+3,0] # radial speed, tangential speed, z_speed


MANEUVERS:    
  - satellite_name: Standard
    maneuver_name: "Burn 1"
    delta_v: [2.93e+3,0,0] #[2.913e+3,0,000] #Prograde, 'radial', normal
    time: 416
    
  - satellite_name: Free Return
    maneuver_name: "Burn 2"
    delta_v: [2.93e+3,0,0] #[2.913e+3,0,000] #Prograde, 'radial', normal
    time: 416
